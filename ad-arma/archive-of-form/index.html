<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Archive of Form</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f4efe6;
        --paper-2: #fffaf1;
        --ink: #1f2328;
        --muted: #616a73;
        --line: #d9cfbb;
        --accent: #3f6f90;
        --warn: #8f5c1b;
        --warn-bg: #fff3da;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Fraunces", Georgia, serif;
        background:
          radial-gradient(circle at 12% 18%, #e8f0f4 0%, transparent 38%),
          linear-gradient(150deg, var(--paper), var(--paper-2) 60%);
        color: var(--ink);
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: 0.02em;
      }
      .subtitle {
        margin: 0 0 28px;
        color: var(--muted);
        font: 500 1.04rem/1.45 "Manrope", system-ui, sans-serif;
      }
      .card {
        background: #fffdfa;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px 20px;
        box-shadow: 0 10px 24px rgba(29, 42, 52, 0.08);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .meta {
        color: var(--muted);
        font: 500 0.95rem/1.45 "Manrope", system-ui, sans-serif;
      }
      ul {
        margin: 12px 0 0;
        padding-left: 18px;
      }
      li {
        margin: 10px 0;
      }
      .badge {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid #c79b5b;
        color: var(--warn);
        background: var(--warn-bg);
        font: 600 0.78rem/1.4 "Manrope", system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>The Archive of Form</h1>
      <p class="subtitle">An Open Library of Sculptures from Antiquity to the Nineteenth Century</p>
      <section class="card">
        <div class="meta">Intake pattern: <code>/ad-arma/archive-of-form/intake/{NNN}-{slug}/</code></div>
        <ul>
          <li>
            <a href="/ad-arma/archive-of-form/intake/001-great-sphinx-of-giza/">001 - Great Sphinx of Giza</a>
            <span class="badge">Ineligible for ingest</span>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
