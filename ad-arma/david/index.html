<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Michelangelo's David - Node/Edge 3D Wireframe</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      :root {
        --bg: #0d1218;
        --panel: #131a23;
        --text: #dce4ef;
        --subtle: #8ea0b8;
        --edge: #83b7f4;
        --node: #f7fbff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 15%, #1f2a37 0%, var(--bg) 60%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }
      .header {
        padding: 14px 18px;
        border-bottom: 1px solid #243345;
        background: rgba(19, 26, 35, 0.9);
        backdrop-filter: blur(3px);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        letter-spacing: 0.02em;
      }
      .sub {
        margin: 0;
        color: var(--subtle);
        font-size: 13px;
      }
      #plot {
        width: 100%;
        height: calc(100% - 74px);
      }
      .loading {
        padding: 24px 18px;
        color: var(--subtle);
      }
      a {
        color: #9ec5ff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1>Michelangelo's David: Node-Edge Wireframe</h1>
        <p class="sub" id="stats">Loading model data...</p>
      </div>
      <div id="plot">
        <div class="loading">
          If this does not load from file://, run
          <code>python3 -m http.server 8000</code> in this folder and open
          <a href="http://localhost:8000">http://localhost:8000</a>.
        </div>
      </div>
    </div>

    <script>
      async function load() {
        const response = await fetch("./david_wireframe.json");
        if (!response.ok) {
          throw new Error(`Failed to load david_wireframe.json (${response.status})`);
        }
        const model = await response.json();

        const vertices = model.vertices;
        const edges = model.edges;
        const nodes = model.nodes;

        const ex = [];
        const ey = [];
        const ez = [];

        for (const [a, b] of edges) {
          const va = vertices[a];
          const vb = vertices[b];
          ex.push(va[0], vb[0], null);
          ey.push(va[1], vb[1], null);
          ez.push(va[2], vb[2], null);
        }

        const nx = [];
        const ny = [];
        const nz = [];
        for (const [x, y, z] of nodes) {
          nx.push(x);
          ny.push(y);
          nz.push(z);
        }

        const edgeTrace = {
          type: "scatter3d",
          mode: "lines",
          x: ex,
          y: ey,
          z: ez,
          line: {
            color: getComputedStyle(document.documentElement).getPropertyValue("--edge").trim(),
            width: 1
          },
          opacity: 0.68,
          hoverinfo: "skip",
          name: "Edges"
        };

        const nodeTrace = {
          type: "scatter3d",
          mode: "markers",
          x: nx,
          y: ny,
          z: nz,
          marker: {
            size: 1.9,
            color: getComputedStyle(document.documentElement).getPropertyValue("--node").trim(),
            opacity: 0.58
          },
          hoverinfo: "skip",
          name: "Nodes"
        };

        const layout = {
          paper_bgcolor: "rgba(0,0,0,0)",
          plot_bgcolor: "rgba(0,0,0,0)",
          margin: { l: 0, r: 0, t: 0, b: 0 },
          showlegend: false,
          scene: {
            xaxis: { visible: false },
            yaxis: { visible: false },
            zaxis: { visible: false },
            aspectmode: "data",
            camera: {
              eye: { x: 1.7, y: 1.5, z: 1.2 }
            }
          }
        };

        await Plotly.newPlot("plot", [edgeTrace, nodeTrace], layout, {
          responsive: true,
          displaylogo: false
        });

        document.getElementById("stats").textContent =
          `Source triangles: ${model.meta.source_triangles.toLocaleString()} | ` +
          `Sample stride: ${model.meta.triangle_stride} | ` +
          `Edges: ${model.meta.edges.toLocaleString()} | ` +
          `Nodes: ${model.meta.nodes.toLocaleString()}`;
      }

      load().catch((error) => {
        const plot = document.getElementById("plot");
        plot.innerHTML =
          `<div class="loading">Error loading model: ${error.message}</div>`;
      });
    </script>
  </body>
</html>
