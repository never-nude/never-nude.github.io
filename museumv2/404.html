<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Page Not Found — Form Gallery</title>
    <meta name="theme-color" content="#111017" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #111017;
        --text: #f7f1ee;
        --muted: #bcaeb7;
        --accent: #f0c0a4;
        --border: #4a3e51;
        --surface: #16131b;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 16% 0%, #f0b6a91f 0%, transparent 28%),
                    radial-gradient(circle at 84% 12%, #b8e4d51a 0%, transparent 24%),
                    linear-gradient(180deg, #111017 0%, #0b0a10 100%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 560px);
        display: grid;
        gap: 20px;
        padding: 36px 32px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: linear-gradient(180deg, var(--surface) 0%, #0f0c14 100%);
        box-shadow: inset 0 1px 0 #ffffff08, 0 18px 38px #00000044;
      }
      .kicker {
        margin: 0;
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        font-size: clamp(2.5rem, 5vw, 3.5rem);
        line-height: 0.92;
        letter-spacing: -0.04em;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
        max-width: 42ch;
      }
      a.btn {
        width: fit-content;
        padding: 12px 18px;
        border: 1px solid #745c70;
        border-radius: 10px;
        background: #241c29;
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-decoration: none;
        transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      }
      a.btn:hover {
        background: #322638;
        border-color: var(--accent);
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Form Gallery</p>
      <h1>Page Not Found</h1>
      <p>The sculpture you're looking for isn't in this wing. It may have been moved, or the path may be incorrect.</p>
      <a class="btn" href="/museumv2/museum/">Return to the Collection</a>
    </main>
  </body>
</html>
