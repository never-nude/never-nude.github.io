<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROMAN TESTUDO - 3D FORMATION STUDY</title>
    <style>
      :root {
        --ink: #1b2225;
        --muted: #5d6a6e;
        --panel: rgba(244, 241, 233, 0.9);
        --panel-border: rgba(71, 82, 84, 0.14);
        --panel-shadow: 0 22px 48px rgba(31, 42, 49, 0.16);
        --accent: #7d2619;
        --accent-soft: rgba(125, 38, 25, 0.12);
        --surface: #ece6da;
        --surface-strong: rgba(255, 255, 255, 0.74);
        --toggle: #40555b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 34%),
          linear-gradient(180deg, #edf3f6 0%, #d7dde0 44%, #c5c1b6 100%);
        overflow: hidden;
      }

      button,
      input {
        font: inherit;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      #scene-root {
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
      }

      .toolbar {
        position: absolute;
        top: 18px;
        left: 18px;
        right: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 14px 18px;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(14px);
        box-shadow: var(--panel-shadow);
        z-index: 10;
      }

      .toolbar-group {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .toolbar-label {
        margin-right: 4px;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .segmented {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip {
        border: 1px solid rgba(62, 75, 79, 0.14);
        background: var(--surface-strong);
        color: var(--ink);
        padding: 0.56rem 0.86rem;
        border-radius: 999px;
        cursor: pointer;
        transition:
          background-color 140ms ease,
          color 140ms ease,
          transform 140ms ease,
          border-color 140ms ease;
      }

      .chip:hover {
        transform: translateY(-1px);
        border-color: rgba(62, 75, 79, 0.25);
      }

      .chip.is-active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.45rem 0.7rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.48);
        border: 1px solid rgba(62, 75, 79, 0.12);
        color: var(--toggle);
        cursor: pointer;
      }

      .toggle input {
        margin: 0;
        accent-color: var(--accent);
      }

      .toggle.is-disabled {
        opacity: 0.5;
        cursor: default;
      }

      .info-panel {
        position: absolute;
        left: 18px;
        bottom: 18px;
        width: min(320px, calc(100vw - 36px));
        padding: 18px;
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        background: rgba(249, 246, 239, 0.9);
        backdrop-filter: blur(14px);
        box-shadow: var(--panel-shadow);
        z-index: 8;
      }

      .info-panel h1 {
        margin: 0 0 14px;
        font-size: 1rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .fact-grid {
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 10px 12px;
        font-size: 0.93rem;
        line-height: 1.35;
      }

      .fact-grid dt {
        margin: 0;
        font-weight: 700;
        color: var(--muted);
      }

      .fact-grid dd {
        margin: 0;
      }

      .loading,
      .status-banner {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        z-index: 12;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        border: 1px solid rgba(48, 59, 63, 0.12);
        background: rgba(248, 245, 238, 0.92);
        box-shadow: 0 18px 42px rgba(26, 33, 36, 0.14);
      }

      .loading {
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .status-banner {
        top: 94px;
        max-width: min(620px, calc(100vw - 36px));
        text-align: center;
      }

      .status-banner[hidden],
      .loading[hidden] {
        display: none;
      }

      @media (max-width: 900px) {
        .toolbar {
          gap: 12px;
          padding: 12px;
        }

        .toolbar-group {
          width: 100%;
        }

        .status-banner {
          top: 158px;
        }

        .info-panel {
          right: 18px;
          left: auto;
          width: min(320px, calc(100vw - 36px));
        }
      }

      @media (max-width: 640px) {
        .toolbar {
          top: 12px;
          left: 12px;
          right: 12px;
          border-radius: 16px;
        }

        .chip {
          padding: 0.52rem 0.78rem;
        }

        .info-panel {
          left: 12px;
          right: 12px;
          bottom: 12px;
          width: auto;
        }

        .status-banner {
          top: 208px;
          width: calc(100vw - 24px);
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <div class="toolbar" id="toolbar">
        <div class="toolbar-group">
          <span class="toolbar-label">View Mode</span>
          <div class="segmented" data-segmented="view-mode">
            <button class="chip is-active" data-view-mode="solid" type="button">Solid</button>
            <button class="chip" data-view-mode="wireframe" type="button">Wireframe</button>
            <button class="chip" data-view-mode="xray" type="button">X-Ray</button>
          </div>
        </div>

        <div class="toolbar-group">
          <span class="toolbar-label">Camera Presets</span>
          <div class="segmented" data-segmented="camera-preset">
            <button class="chip is-active" data-camera-preset="front" type="button">Front</button>
            <button class="chip" data-camera-preset="side" type="button">Side</button>
            <button class="chip" data-camera-preset="top" type="button">Top</button>
            <button class="chip" data-camera-preset="inside" type="button">Inside</button>
          </div>
        </div>

        <div class="toolbar-group">
          <label class="toggle" id="toggle-soldiers">
            <input checked data-toggle="showSoldiers" type="checkbox" />
            <span>Show soldier meshes</span>
          </label>
          <label class="toggle" id="toggle-shields-only">
            <input data-toggle="shieldsOnly" type="checkbox" />
            <span>Show shields only</span>
          </label>
          <label class="toggle" id="toggle-grid">
            <input data-toggle="showGrid" type="checkbox" />
            <span>Show formation grid</span>
          </label>
        </div>
      </div>

      <aside class="info-panel" aria-label="formation facts">
        <h1>Roman Testudo Formation</h1>
        <dl class="fact-grid">
          <dt>Culture</dt>
          <dd>Roman</dd>
          <dt>Period</dt>
          <dd>Late Republic - Early Imperial</dd>
          <dt>Type</dt>
          <dd>Defensive shield formation</dd>
          <dt>Purpose</dt>
          <dd>Protection from missile fire during siege approaches</dd>
        </dl>
      </aside>

      <div class="loading" id="loading">Loading formation assets...</div>
      <div class="status-banner" hidden id="status-banner"></div>
      <div id="scene-root"></div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
